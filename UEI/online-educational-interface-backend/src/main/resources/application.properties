# ===========================
# Application Configuration
# ===========================
spring.application.name=online-educational-interface

# ===========================
# Server Configuration
# ===========================
server.port=8080

# ===========================
# MySQL Database Configuration
# Change these values to match your local MySQL setup
# To switch to PostgreSQL: change driver, url, and dialect below
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/education_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate Configuration
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Allow data.sql to run after JPA schema creation
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===========================
# JWT Configuration
# ===========================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ===========================
# File Upload Configuration
# ===========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===========================
# Logging
# ===========================
logging.level.org.springframework.security=DEBUG
logging.level.com.example=DEBUG
