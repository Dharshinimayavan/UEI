version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: uei-postgres
    environment:
      POSTGRES_DB: uei_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - uei-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend — Spring Boot
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uei-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/uei_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: uei-super-secret-key-for-jwt-tokens-must-be-256-bits-long-change-in-prod
      AI_SERVICE_URL: http://ai-service:8001
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - uei-network
    restart: unless-stopped

  # AI Service — Python FastAPI
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: uei-ai-service
    ports:
      - "8001:8001"
    networks:
      - uei-network
    restart: unless-stopped

  # Frontend — React + Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uei-frontend
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - uei-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  uei-network:
    driver: bridge
